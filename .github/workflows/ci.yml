name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: macos-14
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30
        with:
          toolchain: 1.96.1
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
        with:
          workspaces: src-tauri
      - name: Enable pinned pnpm
        run: corepack prepare pnpm@11.10.0 --activate
      - run: corepack pnpm install --frozen-lockfile
      - name: Verify versions and immutable sidecars
        run: |
          corepack pnpm run verify:release
          corepack pnpm run verify:fonts
          corepack pnpm run verify:secrets
          corepack pnpm run verify:icons
          shasum -a 256 -c src-tauri/binaries/SHA256SUMS
          test -x src-tauri/binaries/ffmpeg-aarch64-apple-darwin
          test -x src-tauri/binaries/ffprobe-aarch64-apple-darwin
      - run: corepack pnpm test
      - run: corepack pnpm run build
      - run: corepack pnpm run verify:lazy
      - run: cargo fmt --check --manifest-path src-tauri/Cargo.toml
      - run: cargo metadata --locked --manifest-path src-tauri/Cargo.toml >/dev/null
      - run: cargo clippy --locked --manifest-path src-tauri/Cargo.toml --all-targets --all-features -- -D warnings
      - run: cargo test --locked --manifest-path src-tauri/Cargo.toml

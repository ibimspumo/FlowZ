name: Release macOS Apple Silicon

on:
  push:
    tags: ['v*']

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-verify:
    environment: release-signing
    permissions:
      actions: read
      contents: read
    runs-on: macos-14
    timeout-minutes: 60
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
          fetch-depth: 0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30
        with:
          toolchain: 1.96.1
          targets: aarch64-apple-darwin
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
        with:
          workspaces: src-tauri
          key: release-aarch64
      - name: Enable pinned pnpm
        run: corepack prepare pnpm@11.10.0 --activate
      - run: corepack pnpm install --frozen-lockfile
      - name: Require tagged commit on main with successful CI
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          git fetch --no-tags origin main
          git merge-base --is-ancestor "$GITHUB_SHA" origin/main
          runs=$(gh api "/repos/$GITHUB_REPOSITORY/actions/workflows/ci.yml/runs?head_sha=$GITHUB_SHA&branch=main&event=push&status=completed")
          test "$(jq '[.workflow_runs[] | select(.conclusion == "success")] | length' <<< "$runs")" -ge 1
      - name: Verify tag, versions and immutable sidecars
        id: version
        run: |
          corepack pnpm run verify:release
          corepack pnpm run verify:fonts
          corepack pnpm run verify:secrets
          corepack pnpm run verify:icons
          shasum -a 256 -c src-tauri/binaries/SHA256SUMS
          test -x src-tauri/binaries/ffmpeg-aarch64-apple-darwin
          test -x src-tauri/binaries/ffprobe-aarch64-apple-darwin
          file src-tauri/binaries/ffmpeg-aarch64-apple-darwin | grep -q 'arm64'
          file src-tauri/binaries/ffprobe-aarch64-apple-darwin | grep -q 'arm64'
          version=$(node -p "require('./package.json').version")
          echo "version=$version" >> "$GITHUB_OUTPUT"
      - run: corepack pnpm test
      - run: corepack pnpm run build
      - run: corepack pnpm run verify:lazy
      - run: cargo fmt --check --manifest-path src-tauri/Cargo.toml
      - run: cargo metadata --locked --manifest-path src-tauri/Cargo.toml >/dev/null
      - run: cargo clippy --locked --manifest-path src-tauri/Cargo.toml --all-targets --all-features -- -D warnings
      - run: cargo test --locked --manifest-path src-tauri/Cargo.toml
      - name: Compile release binary without signing credentials
        run: corepack pnpm exec tauri build --ci --no-bundle --target aarch64-apple-darwin -- --locked
      - name: Sign and bundle only
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          test -n "$TAURI_SIGNING_PRIVATE_KEY"
          test -n "$TAURI_SIGNING_PRIVATE_KEY_PASSWORD"
          corepack pnpm exec tauri bundle --ci --target aarch64-apple-darwin --bundles app,dmg
      - name: Validate architecture, ad-hoc signatures, DMG and updater signature
        run: bash scripts/verify-macos-release-artifacts.sh "${{ steps.version.outputs.version }}"
      - name: Stage verified release artifacts
        run: |
          set -euo pipefail
          mkdir release-assets
          cp "src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/FlowZ_${{ steps.version.outputs.version }}_aarch64.dmg" release-assets/
          cp src-tauri/target/aarch64-apple-darwin/release/bundle/macos/FlowZ.app.tar.gz release-assets/
          cp src-tauri/target/aarch64-apple-darwin/release/bundle/macos/FlowZ.app.tar.gz.sig release-assets/
          curl --fail --location --proto '=https' --tlsv1.2 https://ffmpeg.org/releases/ffmpeg-8.1.2.tar.xz -o release-assets/ffmpeg-8.1.2.tar.xz
          echo '464beb5e7bf0c311e68b45ae2f04e9cc2af88851abb4082231742a74d97b524c  release-assets/ffmpeg-8.1.2.tar.xz' | shasum -a 256 -c -
          cp src-tauri/third-party/ffmpeg/README.md release-assets/FFMPEG-SOURCE-AND-BUILD.md
          (cd release-assets && shasum -a 256 FlowZ*) > release-assets/SHA256SUMS.build
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: release-assets
          path: release-assets
          if-no-files-found: error
          retention-days: 1

  publish:
    needs: build-and-verify
    permissions:
      actions: read
      contents: write
    runs-on: macos-14
    timeout-minutes: 15
    steps:
      - name: Create, validate and atomically publish release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ needs.build-and-verify.outputs.version }}
        run: |
          set -euo pipefail
          test "$GITHUB_REF_NAME" = "v$VERSION"
          gh run download "$GITHUB_RUN_ID" --repo "$GITHUB_REPOSITORY" --name release-assets --dir release-assets
          (cd release-assets && shasum -a 256 -c SHA256SUMS.build)
          dmg=$(find release-assets -maxdepth 1 -type f -name '*.dmg')
          archive=$(find release-assets -maxdepth 1 -type f -name '*.app.tar.gz')
          signature="$archive.sig"
          test -f "$dmg" && test -f "$archive" && test -f "$signature"
          if gh release view "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            test "$(gh release view "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" --json isDraft -q .isDraft)" = true
          else
            gh release create "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" --verify-tag --draft --generate-notes --title "FlowZ $GITHUB_REF_NAME"
          fi
          gh release view "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" --json body -q .body > generated-notes.md
          {
            echo 'Unsigned Apple-Silicon build: ad-hoc signed, not Apple-notarized. Follow the README installation notes if Gatekeeper blocks the first launch.'
            echo
            cat generated-notes.md
          } > release-notes.md
          gh release edit "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" --notes-file release-notes.md
          archive_name=$(basename "$archive")
          archive_url="https://github.com/$GITHUB_REPOSITORY/releases/download/$GITHUB_REF_NAME/$archive_name"
          jq -n \
            --arg version "$VERSION" \
            --rawfile notes release-notes.md \
            --arg pub_date "$(date -u +'%Y-%m-%dT%H:%M:%SZ')" \
            --rawfile signature "$signature" \
            --arg url "$archive_url" \
            '{version:$version,notes:($notes|rtrimstr("\n")),pub_date:$pub_date,platforms:{"darwin-aarch64":{signature:($signature|rtrimstr("\n")),url:$url}}}' > release-assets/latest.json
          test "$(jq -r .version release-assets/latest.json)" = "$VERSION"
          test "$(jq -r '.platforms["darwin-aarch64"].url' release-assets/latest.json)" = "$archive_url"
          test "$(jq -r '.platforms["darwin-aarch64"].signature' release-assets/latest.json)" = "$(cat "$signature")"
          test -n "$(jq -r .notes release-assets/latest.json)"
          rm release-assets/SHA256SUMS.build
          (cd release-assets && shasum -a 256 FlowZ* ffmpeg-8.1.2.tar.xz FFMPEG-SOURCE-AND-BUILD.md latest.json) > release-assets/SHA256SUMS.txt
          gh release upload "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" release-assets/FlowZ* release-assets/ffmpeg-8.1.2.tar.xz release-assets/FFMPEG-SOURCE-AND-BUILD.md release-assets/latest.json release-assets/SHA256SUMS.txt --clobber
          mkdir published
          gh release download "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" --dir published
          (cd published && shasum -a 256 -c SHA256SUMS.txt)
          test "$(jq -r .version published/latest.json)" = "$VERSION"
          test "$(jq -r '.platforms["darwin-aarch64"].signature' published/latest.json)" = "$(cat "$signature")"
          gh release edit "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" --draft=false --latest
